<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fluxly - Entrar ou Criar Conta</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d5a944",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0a0a0a",
                        "card-dark": "#141414",
                        "input-dark": "#0f0f0f",
                        "border-dark": "#2a2a2a",
                        "muted-gray": "#8a8a8a"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[440px] flex flex-col items-center gap-8">
<!-- Logo Section -->
<div class="flex items-center gap-3">
<div class="text-primary size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 42.4379C4 42.4379 14.0962 36.0744 24 41.1692C35.0664 46.8624 44 42.2078 44 42.2078L44 7.01134C44 7.01134 35.068 11.6577 24.0031 5.96913C14.0971 0.876274 4 7.27094 4 7.27094L4 42.4379Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Fluxly</h1>
</div>
<!-- Central Card -->
<div class="w-full bg-white dark:bg-card-dark border border-slate-200 dark:border-border-dark rounded-xl shadow-2xl overflow-hidden">
<!-- Tabs Navigation -->
<div class="flex border-b border-slate-200 dark:border-border-dark">
<button class="flex-1 py-4 text-sm font-semibold border-b-2 border-primary text-primary transition-colors">
                    Entrar
                </button>
<button class="flex-1 py-4 text-sm font-semibold border-b-2 border-transparent text-slate-500 dark:text-muted-gray hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                    Criar conta
                </button>
</div>
<!-- Form Content -->
<div class="p-8 flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-slate-50 dark:bg-input-dark border border-slate-200 dark:border-border-dark text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-muted-gray focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" id="email" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Senha</label>
</div>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 rounded-lg bg-slate-50 dark:bg-input-dark border border-slate-200 dark:border-border-dark text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-muted-gray focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all pr-12" id="password" placeholder="Sua senha" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-muted-gray hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-center">
<a class="text-xs font-medium text-slate-500 dark:text-muted-gray hover:text-primary dark:hover:text-primary underline underline-offset-4 transition-colors" href="#">
                        Esqueci minha senha
                    </a>
</div>
<!-- Primary Action Button -->
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-black font-bold rounded-lg shadow-lg shadow-primary/10 transition-all active:scale-[0.98]">
                    Entrar
                </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-border-dark"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-slate-400 dark:text-muted-gray uppercase tracking-widest">Ou continue com</span>
<div class="flex-grow border-t border-slate-200 dark:border-border-dark"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-11 rounded-lg border border-slate-200 dark:border-border-dark bg-white dark:bg-transparent hover:bg-slate-50 dark:hover:bg-white/5 transition-colors gap-2">
<div class="w-5 h-5">
<svg viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
</div>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center h-11 rounded-lg border border-slate-200 dark:border-border-dark bg-white dark:bg-transparent hover:bg-slate-50 dark:hover:bg-white/5 transition-colors gap-2">
<div class="w-5 h-5 text-slate-900 dark:text-white">
<svg fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
</div>
<span class="text-sm font-medium">GitHub</span>
</button>
</div>
</div>
<!-- Footer Message -->
<div class="bg-slate-50 dark:bg-primary/5 px-8 py-4 border-t border-slate-200 dark:border-border-dark">
<p class="text-[11px] text-center text-slate-400 dark:text-muted-gray leading-relaxed">
                    Ao entrar, você concorda com nossos <a class="underline hover:text-primary" href="#">Termos de Serviço</a> e <a class="underline hover:text-primary" href="#">Política de Privacidade</a>.
                </p>
</div>
</div>
<!-- App Store Badges (Optional Contextual Elements) -->
<div class="flex gap-4 opacity-50 hover:opacity-100 transition-opacity">
<div class="h-8 w-24 bg-slate-200 dark:bg-border-dark rounded flex items-center justify-center">
<span class="material-symbols-outlined text-sm">laptop_mac</span>
<span class="text-[10px] font-bold ml-1">macOS</span>
</div>
<div class="h-8 w-24 bg-slate-200 dark:bg-border-dark rounded flex items-center justify-center">
<span class="material-symbols-outlined text-sm">window</span>
<span class="text-[10px] font-bold ml-1">Windows</span>
</div>
</div>
</div>
</body></html>
